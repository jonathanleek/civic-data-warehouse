name: 'cdw'
version: '1.0.0'
config-version: 2

profile: 'cdw'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  cdw:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    core:
      +materialized: table
      +schema: current
